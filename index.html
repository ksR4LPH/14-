<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Для Зарин 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background music: Peder B. Helland - Sunny Mornings (piano+guitar, no vocals) -->
  <iframe id="yt-music"
    src="https://www.youtube.com/embed/hlWiI4xVXKY?autoplay=1&loop=1&playlist=hlWiI4xVXKY&controls=0&mute=0"
    allow="autoplay"
    style="position:fixed;top:-9999px;width:1px;height:1px;"
    frameborder="0">
  </iframe>

  <div id="bg-particles"></div>

  <div id="app">
    <!-- Intro screen -->
    <div id="intro">
      <p class="intro-for">для</p>
      <h1 class="intro-name">Зарин</h1>
      <p class="intro-hint">нажми на лепесток и узнай 🌸</p>
    </div>

    <!-- Flower -->
    <div id="flower-wrap">
      <svg id="flower-svg" viewBox="-200 -200 400 400" xmlns="http://www.w3.org/2000/svg">
        <!-- Petals rendered by JS -->
        <g id="petals-group"></g>
        <!-- Center -->
        <circle id="flower-center" cx="0" cy="0" r="38" />
      </svg>
    </div>

    <!-- Message card -->
    <div id="msg-card" class="hidden">
      <button id="msg-close">✕</button>
      <div id="msg-petal-num"></div>
      <div id="msg-text"></div>
    </div>

    <!-- Petal counter -->
    <div id="counter"><span id="counter-done">0</span> / 14</div>
  </div>

  <!-- Floating particles canvas -->
  <canvas id="canvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
